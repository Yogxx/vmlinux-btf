name: Build vmlinux-btf subpackage

on:
  workflow_dispatch:
    inputs:
      openwrt_branches:
        description: 'OpenWrt branch to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - openwrt-25.12
          - openwrt-24.10
      targets:
        description: 'Targets (comma-separated: rpi4, x86_64, rockchip, cortexa53, aarch64_generic — atau "all")'
        required: true
        default: 'all'
      pkg_path:
        description: 'Path of this package inside package/ dir'
        required: true
        default: 'package/kernel/vmlinux-btf'
      create_release:
        description: 'Upload to GitHub Releases'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve target matrix
        id: resolve
        run: |
          ALL_TARGETS='[
            {"target":"bcm27xx",  "subtarget":"bcm2711",   "label":"rpi4"},
            {"target":"x86",      "subtarget":"64",         "label":"x86_64"},
            {"target":"sunxi",    "subtarget":"cortexa53",  "label":"cortexa53"},
            {"target":"rockchip", "subtarget":"armv8",      "label":"rockchip"},
            {"target":"armsr",    "subtarget":"armv8",      "label":"aarch64_generic"}
          ]'

          ALL_BRANCHES='["openwrt-25.12","openwrt-24.10"]'

          INPUT_BRANCH="${{ inputs.openwrt_branches }}"
          if [ "$INPUT_BRANCH" = "both" ]; then
            BRANCHES="$ALL_BRANCHES"
          else
            BRANCHES="[\"$INPUT_BRANCH\"]"
          fi

          INPUT_TARGET="${{ inputs.targets }}"

          MATRIX=$(python3 -c "
          import json, sys

          all_targets = json.loads('''$ALL_TARGETS''')
          branches    = json.loads('$BRANCHES')
          inp         = '$INPUT_TARGET'.strip()

          if inp == 'all':
            selected = all_targets
          else:
            labels = [x.strip() for x in inp.split(',')]
            selected = [t for t in all_targets
                        if t['target'] in labels or t['label'] in labels]

          matrix = []
          for b in branches:
            for t in selected:
              entry = dict(t)
              entry['branch'] = b
              entry['label']  = t['label'] + '_' + b.replace('openwrt-', '')
              matrix.append(entry)

          print(json.dumps(matrix))
          ")

          echo "matrix=$(echo $MATRIX | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: |
          DATE="$(date +'%Y%m%d-%H%M')"
          echo "tag=vmlinux-btf-${DATE}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    name: Build [${{ matrix.label }}]

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm
          sudo docker image prune --all --force || true
          df -h

      - name: Checkout this repo (package source)
        uses: actions/checkout@v4
        with:
          path: pkgsrc

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils python3-setuptools \
            python3-dev rsync swig unzip zlib1g-dev file wget \
            libelf-dev dwarves ccache \
            python3-pyelftools

      - name: Clone OpenWrt buildroot
        run: |
          git clone --depth 1 -b "${{ matrix.branch }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Inject custom package
        run: |
          mkdir -p "openwrt/${{ inputs.pkg_path }}"
          cp -r pkgsrc/* "openwrt/${{ inputs.pkg_path }}/"

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.branch }}-${{ matrix.label }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.branch }}-${{ matrix.label }}-

      - name: Restore dl/ cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ matrix.branch }}-${{ matrix.label }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            dl-${{ matrix.branch }}-${{ matrix.label }}-
            dl-${{ matrix.branch }}-

      - name: Set defconfig
        working-directory: openwrt
        run: |
          cat <<EOF > .config
          CONFIG_TARGET_${{ matrix.target }}=y
          CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y
          CONFIG_PACKAGE_vmlinux-btf=y
          EOF
          make defconfig

      - name: Show resolved config (debug)
        working-directory: openwrt
        run: |
          ./scripts/diffconfig.sh || true
          grep vmlinux-btf .config || true

      - name: Download kernel sources
        working-directory: openwrt
        run: make download -j$(nproc) V=s

      - name: Build tools
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make tools/install -j$(nproc) V=s

      - name: Build toolchain
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make toolchain/install -j$(nproc) V=s

      - name: Build target kernel
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make target/linux/compile -j$(nproc) V=s

      - name: Build vmlinux-btf package
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make "${{ inputs.pkg_path }}/compile" -j$(nproc) V=s

      - name: Collect artifacts
        working-directory: openwrt
        run: |
          find bin/ -iname "*vmlinux-btf*"
          mkdir -p /tmp/release-files
          find bin/ \( -iname "*vmlinux-btf*.ipk" -o -iname "*vmlinux-btf*.apk" \) \
            -exec cp {} /tmp/release-files/ \;

          for f in /tmp/release-files/*; do
            base=$(basename "$f")
            ext="${base##*.}"
            name="${base%.*}"
            if [ "$ext" = "apk" ]; then
              mv "$f" "/tmp/release-files/${name}-${{ matrix.label }}.${ext}"
            else
              mv "$f" "/tmp/release-files/${name}_${{ matrix.label }}.${ext}"
            fi
          done
          ls /tmp/release-files/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-btf-${{ matrix.label }}
          path: /tmp/release-files/
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    if: ${{ inputs.create_release == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Download semua artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List files
        run: find release-files/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: "vmlinux-btf | ${{ inputs.openwrt_branches }} | ${{ github.run_id }}"
          body: |
            ## vmlinux-btf build

            | Info | Value |
            |------|-------|
            | Branch | `${{ inputs.openwrt_branches }}` |
            | Targets | `${{ inputs.targets }}` |
            | Triggered by | @${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### Cara install
            Download file sesuai target dan branch lu.

            **OpenWrt 24.10 (IPK):**
            ```sh
            opkg install vmlinux-btf_*24.10*.ipk
            ```
            **OpenWrt 25.12 (APK):**
            ```sh
            apk add --allow-untrusted vmlinux-btf-*25.12*.apk
            ```
          files: release-files/**
          fail_on_unmatched_files: true
