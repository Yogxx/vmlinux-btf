name: Build vmlinux-btf subpackage

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch/tag (e.g. openwrt-24.10, v24.10.5)'
        required: true
        default: 'openwrt-25.12'
      targets:
        description: 'Targets to build (comma-separated: bcm27xx, x86, aarch64 — atau "all")'
        required: true
        default: 'all'
      pkg_path:
        description: 'Path of this package inside package/ dir'
        required: true
        default: 'package/kernel/vmlinux-btf'

jobs:
  # Job ini resolve input "all" / comma-separated jadi matrix
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve target matrix
        id: resolve
        run: |
          ALL_TARGETS='[
            {"target":"bcm27xx",  "subtarget":"bcm2711",  "label":"rpi4"},
            {"target":"x86",      "subtarget":"64",        "label":"x86_64"},
            {"target":"sunxi",      "subtarget":"cortexa53",        "label":"cortexa53"},
            {"target":"rockchip",    "subtarget":"armv8",     "label":"rockchip"},
            {"target":"armsr",    "subtarget":"armv8",     "label":"aarch64_generic"}
          ]'

          INPUT="${{ inputs.targets }}"

          if [ "$INPUT" = "all" ]; then
            MATRIX="$ALL_TARGETS"
          else
            MATRIX="["
            FIRST=true
            IFS=',' read -ra SELECTED <<< "$INPUT"
            for sel in "${SELECTED[@]}"; do
              sel=$(echo "$sel" | tr -d ' ')
              ENTRY=$(echo "$ALL_TARGETS" | \
                python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          sel = '${sel}'
          matches = [x for x in data if x['target'] == sel or x['label'] == sel]
          print(json.dumps(matches[0]) if matches else '')
          ")
              if [ -n "$ENTRY" ]; then
                $FIRST || MATRIX="$MATRIX,"
                MATRIX="$MATRIX$ENTRY"
                FIRST=false
              fi
            done
            MATRIX="$MATRIX]"
          fi

          echo "matrix=$(echo $MATRIX | tr -d '\n')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false   # target lain tetap lanjut walau satu gagal
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    name: Build [${{ matrix.label }}]

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm
          sudo docker image prune --all --force || true
          df -h

      - name: Checkout this repo (package source)
        uses: actions/checkout@v4
        with:
          path: pkgsrc

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils python3-setuptools \
            python3-dev rsync swig unzip zlib1g-dev file wget \
            libelf-dev dwarves ccache
            python3-pyelftools

      - name: Clone OpenWrt buildroot
        run: |
          git clone --depth 1 -b "${{ inputs.openwrt_branch }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Inject custom package
        run: |
          mkdir -p "openwrt/${{ inputs.pkg_path }}"
          cp -r pkgsrc/* "openwrt/${{ inputs.pkg_path }}/"

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ inputs.openwrt_branch }}-${{ matrix.label }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ inputs.openwrt_branch }}-${{ matrix.label }}-

      - name: Restore dl/ cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-${{ inputs.openwrt_branch }}-${{ matrix.label }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            dl-${{ inputs.openwrt_branch }}-${{ matrix.label }}-
            dl-${{ inputs.openwrt_branch }}-

      - name: Set defconfig
        working-directory: openwrt
        run: |
          cat <<EOF > .config
          CONFIG_TARGET_${{ matrix.target }}=y
          CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y
          CONFIG_PACKAGE_vmlinux-btf=y
          EOF
          make defconfig

      - name: Show resolved package config (debug)
        working-directory: openwrt
        run: |
          ./scripts/diffconfig.sh || true
          grep vmlinux-btf .config || true

      - name: Download kernel sources
        working-directory: openwrt
        run: make download -j$(nproc) V=s

      - name: Build tools
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make tools/install -j$(nproc) V=s

      - name: Build toolchain
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make toolchain/install -j$(nproc) V=s

      - name: Build target kernel
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make target/linux/compile -j$(nproc) V=s

      - name: Build vmlinux-btf package
        working-directory: openwrt
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          make "${{ inputs.pkg_path }}/compile" -j$(nproc) V=s

      - name: Locate built ipk/apk
        working-directory: openwrt
        run: find bin/ -iname "*vmlinux-btf*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-btf-${{ matrix.label }}-${{ inputs.openwrt_branch }}
          path: |
            openwrt/bin/**/vmlinux-btf*.ipk
            openwrt/bin/**/vmlinux-btf*.apk
          if-no-files-found: error
